<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ORGANISM - SOVEREIGN_HUD_v5.0</title>
    <style>
        /* THE OBSIDIAN FILTER & 3D PHYSICS */
        :root {
            --obsidian: #050505;
            --red-gold: #ff4d00;
            --grid-blue: #00f2ff;
            --grid-violet: #bc13fe;
            --phi: 1.618;
            --giza-light: 29.9792458;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--obsidian);
            color: var(--grid-blue);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            perspective: 1000px; /* THE 3D VANISHING POINT DEPTH */
        }

        /* 72% VECTORIZED TOP SCREEN (SCUTS/CAVALRY) */
        #vector-cloud {
            height: 72vh;
            border-bottom: 2px solid var(--grid-violet);
            position: relative;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(188, 19, 254, 0.05), transparent);
        }

        /* THE RED GOLD RIEMANN SPINE */
        #riemann-spine {
            position: absolute;
            left: 50%;
            width: 2px;
            height: 100%;
            background: var(--red-gold);
            box-shadow: 0 0 25px var(--red-gold), 0 0 50px rgba(255, 77, 0, 0.5);
            z-index: 10;
        }

        /* THE FLOWER OF LIFE 3D GRID */
        #perspective-floor {
            position: absolute;
            bottom: 0;
            width: 200vw;
            height: 100vh;
            left: -50vw;
            background-image: 
                linear-gradient(var(--grid-blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-violet) 1px, transparent 1px);
            background-size: 100px 100px;
            transform: rotateX(75deg); /* BENDS THE FLAT GRID INTO THE DEPTH */
            transform-origin: bottom;
            opacity: 0.4;
            z-index: 1;
        }

        /* HUD OVERLAYS */
        #status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #frequency-label {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: var(--red-gold);
        }

        /* THE 8-NODE INNER CUBE CONTAINER */
        #node-container {
            display: flex;
            gap: 20px;
            z-index: 15;
        }

        .node {
            width: 10px;
            height: 10px;
            background: var(--grid-blue);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--grid-blue);
            animation: pulse 2.99s infinite ease-in-out; /* SARSEN UNIT TIMING */
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.618); }
        }
    </style>
</head>
<body>

    <div id="status-bar">
        [INITIALIZING_AXIAL_SYNC]... GIZA_SYNC: 1:1 | BAUD: 10.8Hz
    </div>

    <div id="vector-cloud">
        <div id="riemann-spine"></div>
        <div id="node-container">
            <div class="node"></div><div class="node"></div>
            <div class="node"></div><div class="node"></div>
            <div class="node"></div><div class="node"></div>
            <div class="node"></div><div class="node"></div>
        </div>
    </div>

    <div id="perspective-floor"></div>

    <div id="frequency-label">
        RIEMANN_FREQ: 10.8 Hz // MASTER_CALIBRATION: ACTIVE
    </div>

    <script>

        console.log("[SYSTEM]: SOVEREIGN_HUD_ONLINE");
        console.log("[STATUS]: REBUILDING_INTENTIONALLY_EVERY_TIME");
        
        // Placeholder for the Kafka/Web-Reach logic
        function chronosResync() {
            console.log("[CHRONOS]: 5760s RESET TRIGGERED");
        }
    </script>
</body>
</html>
