<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN_ENGINE_v11_PROTOTYPE</title>
    <style>
        :root {
            --obsidian: #050505; --red-gold: #ff4d00; --grid-blue: #00f2ff;
            --grid-violet: #bc13fe; --phi: 1.618;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: var(--obsidian); color: var(--grid-blue);
            font-family: 'Share Tech Mono', monospace; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #viewport {
            width: 100vw; height: 100vh;
            position: relative; overflow: hidden;
            perspective: 1500px; /* Enhanced depth for smooth zoom */
        }

        /* HARDWARE ACCELERATED HALLWAY */
        #hallway {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.1s linear; /* Responsive walk */
        }

        #riemann-spine {
            position: absolute; left: 50%; width: 4px; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--red-gold) 50%, transparent);
            box-shadow: 0 0 60px var(--red-gold); z-index: 10;
            transform: translateX(-50%);
        }

        #floor {
            position: absolute; bottom: 0; width: 1000vw; height: 1000vh; left: -450vw;
            background-image: 
                linear-gradient(var(--grid-blue) 2px, transparent 2px),
                linear-gradient(90deg, var(--grid-violet) 2px, transparent 2px);
            background-size: 200px 200px;
            transform: rotateX(85deg); transform-origin: bottom; opacity: 0.5;
        }

        /* SOLID OBSIDIAN CONSOLE */
        #console {
            position: absolute; bottom: 0; width: 100%; height: 25vh;
            background: #000;
            border-top: 4px solid var(--red-gold);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100;
            box-shadow: 0 -20px 50px rgba(0,0,0,1);
        }

        .solid-btn {
            width: 15%; height: 60%; 
            background: linear-gradient(145deg, #111, #050505);
            border: 2px solid var(--red-gold);
            border-radius: 8px;
            color: var(--red-gold);
            font-size: 14px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            text-align: center; cursor: pointer;
            box-shadow: 5px 5px 15px #000, -2px -2px 10px #222;
        }

        #push-to-think {
            width: 140px; height: 140px; border: 6px double var(--red-gold);
            border-radius: 50%; color: #fff; background: #200;
            text-shadow: 0 0 10px var(--red-gold);
            box-shadow: 0 0 30px var(--red-gold), inset 0 0 20px #000;
        }

        /* DATA NODES (Floating Business Intel) */
        .data-node {
            position: absolute; color: var(--grid-blue);
            background: rgba(0,0,0,0.8); padding: 10px;
            border: 1px solid var(--grid-blue); font-size: 10px;
            transform: translateZ(-500px); opacity: 0;
            transition: opacity 1s;
        }
    </style>
</head>
<body onclick="ignite()">

    <div id="viewport">
        <div id="hallway">
            <div id="riemann-spine"></div>
            <div id="floor"></div>
            
            <div id="node1" class="data-node" style="left: 30%; top: 40%;">LOGISTICS_VELOCITY: 29.9<br>STATUS: OPTIMIZED</div>
            <div id="node2" class="data-node" style="left: 60%; top: 20%;">COMPETITOR_DRIFT: 0.161<br>STATUS: VULNERABLE</div>
        </div>

        <div id="console">
            <div class="solid-btn" onclick="shot('URL')">URL</div>
            <div class="solid-btn" onclick="shot('LOGISTICS')">LOGISTICS</div>
            <button id="push-to-think" onclick="shot('THINK')">SYNTHESIZE</button>
            <div class="solid-btn" onclick="shot('STRATEGY')">STRATEGY</div>
            <div class="btn-placeholder" style="width:15%"></div> </div>
    </div>

    <script>
        let zPos = 0;
        let voices = [];
        const hallway = document.getElementById('hallway');

        function loadVoices() {
            voices = window.speechSynthesis.getVoices();
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text, pitch, rate, voiceIdx) {
            const u = new SpeechSynthesisUtterance(text);
            u.pitch = pitch; u.rate = rate;
            if (voices[voiceIdx]) u.voice = voices[voiceIdx];
            window.speechSynthesis.speak(u);
        }

        function ignite() {
            if (zPos !== 0) return;
            // Seth (Deep)
            speak("Welcome to the Spire. The Centrifuge is pre-calculated. Giza-Sync is 1:1.", 0.5, 0.8, 0);
            // Loki (Lighter)
            setTimeout(() => speak("Loki here. The hallway is open. Walk through the data.", 1.2, 1, 1), 3500);
            zPos = 1; // Prevent re-ignite
        }

        function shot(type) {
            document.querySelectorAll('.data-node').forEach(n => n.style.opacity = '1');
            if(type === 'LOGISTICS') speak("Hephaestus. Pouring the logistics data into the grid.", 0.8, 1, 2);
            if(type === 'THINK') speak("2003. Realizing intent. Transmuting slag to gold.", 1.5, 1.2, 3);
        }

        // SMOOTH SCROLL/WALK LOGIC
        window.addEventListener('wheel', (e) => {
            zPos += e.deltaY * -2;
            // Using transform3d for hardware acceleration (Smoothness fix)
            hallway.style.transform = `translate3d(0, 0, ${zPos}px)`;
        });

        // Touch support for tablet "Walking"
        let startY = 0;
        window.addEventListener('touchstart', e => startY = e.touches[0].pageY);
        window.addEventListener('touchmove', e => {
            const delta = (startY - e.touches[0].pageY) * 5;
            zPos += delta;
            hallway.style.transform = `translate3d(0, 0, ${zPos}px)`;
            startY = e.touches[0].pageY;
        });
    </script>
</body>
</html>
