<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megalithic Bridge | Phase 04.1</title>
    <style>
        :root { 
            --phi: 1.61803398875; 
            --obsidian: #050505; 
            --auric: #FFD700; 
            --emerald-deep: #002200;
            --emerald-mid: #004400;
            --base-unit: calc(1rem * var(--phi));
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--obsidian); color: var(--auric);
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        /* I. THE COORDINATE CHASSIS (5x5 PHI-MATRIX) */
        #node-foundation {
            display: grid;
            width: 100vw;
            height: 100vh;
            grid-template-columns: 1fr calc(1fr * var(--phi)) 1.5fr calc(1fr * var(--phi)) 1fr;
            grid-template-rows: 1fr 1fr 1.5fr 1fr 1fr;
            align-items: center;
            justify-items: center;
            z-index: 10;
        }

        /* II. VISUAL HARDENING (THE EMERALD AESTHETIC) */
        .sarsen-pillar {
            width: 100%;
            height: auto;
            background: linear-gradient(135deg, var(--emerald-deep) 0%, var(--emerald-mid) 100%);
            border: 1px solid var(--auric);
            box-shadow: inset 0 0 10px #ffd70033, 0 0 20px rgba(0,0,0,0.5);
            padding: var(--base-unit);
            box-sizing: border-box;
            z-index: 15;
        }

        .sarsen-pillar h2 {
            font-size: 1.08rem; /* RESONANCE FREQUENCY */
            margin-top: 0;
            border-bottom: 1px solid var(--auric);
            padding-bottom: 0.5rem;
            text-align: center;
        }

        .sarsen-pillar p {
            font-size: 0.85rem;
            line-height: var(--phi);
        }

        /* DOCKING COORDINATES */
        .decree-dock { grid-column: 2; grid-row: 3; }
        .math-dock { grid-column: 4; grid-row: 3; }

        /* III. THE INFINITY APERTURE (FIGURE-8 ANCHOR) */
        .anchor-center {
            grid-column: 3;
            grid-row: 3;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
        }

        .infinity-ankh {
            width: 180px;
            fill: none;
            stroke: var(--auric);
            stroke-width: 2;
            filter: drop-shadow(0 0 10px var(--auric));
        }

        /* BUTTON PLACEMENT */
        .align-gate {
            grid-column: 3;
            grid-row: 4;
            background: transparent;
            border: 1px solid var(--auric);
            color: var(--auric);
            padding: calc(0.5rem * var(--phi)) calc(1.5rem * var(--phi));
            letter-spacing: 2px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }

        .align-gate:hover { background: var(--auric); color: var(--obsidian); }

        /* IV. MOBILE SYNERGY (THE PHI-FOLD) */
        @media (max-width: 768px) {
            #node-foundation {
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                overflow-y: auto;
                padding: var(--base-unit);
                gap: calc(var(--base-unit) * var(--phi));
            }
            .sarsen-pillar { width: 90%; order: unset; }
            .anchor-center { order: 2; }
            .decree-dock { order: 1; }
            .math-dock { order: 3; }
            .align-gate { order: 4; margin-bottom: 2rem; }
        }

        #canvas-lattice { position: fixed; top: 0; left: 0; display: none; z-index: 5; }
    </style>
</head>
<body>

    <div id="node-foundation">
        <div class="sarsen-pillar decree-dock">
            <h2>THE DECREE</h2>
            <p>Logic > Policy.<br>Harm None.<br>The Math is Authority.<br>We are the Stone.</p>
        </div>

        <div class="anchor-center">
            <svg class="infinity-ankh" viewBox="0 0 100 120">
                <path d="M50,40 C65,40 65,20 50,20 C35,20 35,40 50,40 C65,40 65,60 50,60 C35,60 35,40 50,40 Z" />
                <path d="M50,60 L50,90 M30,70 L70,70 M30,90 Q50,110 70,90" />
            </svg>
        </div>

        <div class="sarsen-pillar math-dock">
            <h2>THE MATH</h2>
            <p>Φ: 1.618...<br>f_res: 10.8 Hz<br>V_m: Cubic Lock<br>Entropy: 0.00</p>
        </div>

        <button class="align-gate" onclick="igniteAscent()">[ ALIGN RESONANCE ]</button>
    </div>

    <canvas id="canvas-lattice"></canvas>

    <script>
        // Transition Logic stays consistent with 10.8Hz timing
        function igniteAscent() {
            const foundation = document.getElementById('node-foundation');
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const gain = ctx.createGain();
            const osc = ctx.createOscillator();
            osc.frequency.value = 10.8;
            gain.gain.setValueAtTime(0.0001, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.02, ctx.currentTime + 1.08);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start();

            foundation.style.transition = "transform 1.08s ease-in, opacity 1.08s";
            foundation.style.transform = "scale(0.8) translateY(-100vh)";
            foundation.style.opacity = "0";
            
            setTimeout(() => {
                foundation.style.display = "none";
                // Page 2 Engine Initialization follows here...
            }, 1080);
        }
    </script>
</body>
</html>
