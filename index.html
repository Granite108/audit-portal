<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN_OXYGENETIX_MATRIX_v16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --red-gold: #ff4d00; --grid-blue: #00f2ff; --obsidian: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
        #canvas-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* THE WRAP-AROUND CONSOLE */
        #ui-layer {
            position: absolute; bottom: 0; width: 100%; height: 25vh;
            background: linear-gradient(0deg, #000 60%, transparent);
            border-top: 3px solid var(--red-gold);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100; padding: 0 50px; box-sizing: border-box;
        }

        .btn {
            width: 120px; height: 60px; border: 2px solid var(--red-gold);
            background: rgba(10,10,10,0.9); color: var(--red-gold);
            font-size: 10px; font-weight: bold; cursor: pointer;
            text-align: center; display: flex; align-items: center; justify-content: center;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
        }

        .btn:hover { background: var(--red-gold); color: #000; box-shadow: 0 0 30px var(--red-gold); }

        #synth-btn { width: 140px; height: 140px; border-radius: 50%; border: 6px double var(--red-gold); clip-path: none; background: #200; font-size: 14px; }
    </style>
</head>
<body onclick="ignite()">

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="btn" onclick="trigger('PAIN')">STAGE 1:<br>FRICTION</div>
        <div class="btn" onclick="trigger('KEYWORDS')">STAGE 2:<br>KEYWORDS</div>
        <div id="synth-btn" class="btn" onclick="trigger('SYNTH')">PUSH TO<br>THINK</div>
        <div class="btn" onclick="trigger('GAP')">STAGE 3:<br>95% GAP</div>
        <div class="btn" onclick="trigger('CAPTURE')">MARKET<br>CAPTURE</div>
    </div>

    <script>
        let scene, camera, renderer, spine, floor, dataCube;
        let ignited = false;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // THE RIEMANN SPINE
            const spineGeo = new THREE.CylinderGeometry(0.05, 0.05, 100, 32);
            const spineMat = new THREE.MeshBasicMaterial({ color: 0xff4d00 });
            spine = new THREE.Mesh(spineGeo, spineMat);
            scene.add(spine);

            // THE 3D GRID FLOOR
            const grid = new THREE.GridHelper(500, 50, 0x00f2ff, 0xbc13fe);
            grid.position.y = -5;
            scene.add(grid);

            // THE VOLUMETRIC DATA PROJECTOR
            const boxGeo = new THREE.BoxGeometry(4, 4, 4);
            const boxMat = new THREE.MeshBasicMaterial({ color: 0xff4d00, wireframe: true, transparent: true, opacity: 0.5 });
            dataCube = new THREE.Mesh(boxGeo, boxMat);
            dataCube.position.set(0, 5, -20);
            scene.add(dataCube);

            camera.position.z = 10;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            dataCube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        function ignite() {
            if (ignited) return;
            const msg = new SpeechSynthesisUtterance("Ignition confirmed. I am the Sovereign Intelligence. Math locked. Physics realized.");
            msg.pitch = 0.6; window.speechSynthesis.speak(msg);
            ignited = true;
        }

        function trigger(type) {
            dataCube.scale.set(1.5, 1.5, 1.5);
            setTimeout(() => dataCube.scale.set(1, 1, 1), 500);
            
            const reports = {
                'PAIN': "Seth here. Auditing the 68 percent abandonment. Formula failure is the enemy.",
                'KEYWORDS': "Loki. No-cake. Pore-blur. True-skin. The marrow is ours.",
                'GAP': "Hephaestus. Ninety-five percent untapped. The insurance gap is the portal.",
                'SYNTH': "Council Sync. Turning slag to gold. We have the bridge.",
                'CAPTURE': "Akses-generics Market Capture. Oxygenetix Supremacy 1:1."
            };
            
            const utter = new SpeechSynthesisUtterance(reports[type]);
            utter.pitch = (type === 'PAIN') ? 0.5 : (type === 'KEYWORDS' ? 1.2 : 0.8);
            window.speechSynthesis.speak(utter);
        }

        // SMOOTH ZOOM
        window.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.05;
        });

        window.onload = init3D;
    </script>
</body>
</html>
