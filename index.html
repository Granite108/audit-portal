<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megalithic Bridge | The Ascent</title>
    <style>
        :root { --phi: 1.618; --obsidian: #050505; --auric: #FFD700; --violet: #5d00ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--obsidian); overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        #legal-shield {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 5, 0.99); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: var(--auric); text-align: center; padding: 20px;
        }
        .shield-text { font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 30px; border: 1px solid var(--auric); padding: 20px; max-width: 80%; line-height: 1.618; }
        .gate-button { 
            background: transparent; border: 1px solid var(--auric); color: var(--auric); 
            padding: 15px 30px; cursor: pointer; transition: 0.3s; letter-spacing: 2px; font-family: inherit;
        }
        .gate-button:hover { background: var(--auric); color: var(--obsidian); }
        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; color: var(--auric); opacity: 0.4; pointer-events: none; letter-spacing: 2px; z-index: 10; }
    </style>
</head>
<body data-tier="Foundation">
    <div id="legal-shield">
        <div class="shield-text">WE PROVIDE THE STONE; YOU BUILD YOUR OWN HOUSE.</div>
        <button class="gate-button" onclick="unlockGate()">[ENTER THE 13TH GATE]</button>
    </div>

    <canvas id="glCanvas"></canvas>
    <footer>granitefoundation@proton.me</footer>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');
        
        let scrollY = 0; 
        let lastTouchY = 0;
        const resonanceStep = 1.08;
        const maxAscent = 10.8;

        function unlockGate() {
            document.getElementById('legal-shield').style.display = 'none';
            Resonance.init();
        }

        const Resonance = {
            ctx: null,
            init() {
                if(this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.value = 10.8;
                gain.gain.setValueAtTime(0.0001, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.02, this.ctx.currentTime + 1.08);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start();
            }
        };

        function updateTierMetadata() {
            const tiers = [
                {threshold: 0, label: "Foundation"},
                {threshold: 1.08, label: "Tier 01"},
                {threshold: 3.24, label: "Tier 02"},
                {threshold: 6.48, label: "Tier 03"},
                {threshold: 8.64, label: "Stage 04"},
                {threshold: 10.8, label: "APEX"}
            ];
            const current = [...tiers].reverse().find(t => scrollY >= t.threshold) || tiers[0];
            document.body.setAttribute('data-tier', current.label);
        }

        window.addEventListener('wheel', (e) => {
            const dir = e.deltaY > 0 ? 1 : -1;
            scrollY = Math.min(Math.max(0, scrollY + (dir * resonanceStep)), maxAscent);
            updateTierMetadata();
        });

        window.addEventListener('touchstart', (e) => { lastTouchY = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => {
            const delta = lastTouchY - e.touches[0].clientY;
            if (Math.abs(delta) > 40) { 
                const dir = delta > 0 ? 1 : -1;
                scrollY = Math.min(Math.max(0, scrollY + (dir * resonanceStep)), maxAscent);
                lastTouchY = e.touches[0].clientY;
                updateTierMetadata();
            }
        });

        const vs = `attribute vec2 p; varying vec2 v; void main(){ v=p; gl_Position=vec4(p,0,1); }`;
        const fs = `
            precision highp float;
            varying vec2 v;
            uniform float t;
            uniform float s;
            void main() {
                vec2 uv = v * 1.618;
                float flip = sign(sin(s * 0.5 + 3.14159)); 
                vec2 lensCenter = vec2(0.0, 0.45);
                float dist = length(uv - lensCenter);
                float loop = max(dist - 0.35, -(dist - 0.25));
                float vibe = sin(t * 10.8) * 0.02 * (1.0 - smoothstep(0.25, 0.35, dist));
                float bar_y = uv.y * flip;
                float crossbar = max(abs(uv.x + vibe) - 0.5, abs(bar_y - 0.05) - 0.04);
                float stem = max(abs(uv.x) - 0.05, abs(bar_y + 0.4) - 0.6);
                float ankh = min(loop, min(crossbar, stem));
                vec3 currentRes = mix(vec3(1.0, 0.84, 0.0), vec3(0.5, 0.0, 0.5), clamp(s / 10.8, 0.0, 1.0));
                gl_FragColor = vec4(mix(vec3(0.01), currentRes * (sin(t * 1.08 + s) * 0.1 + 0.9), smoothstep(0.01, 0.0, ankh)), 1.0);
            }
        `;

        const setup = () => {
            const sObj = (type, src) => { const obj = gl.createShader(type); gl.shaderSource(obj, src); gl.compileShader(obj); return obj; };
            const prog = gl.createProgram();
            gl.attachShader(prog, sObj(gl.VERTEX_SHADER, vs));
            gl.attachShader(prog, sObj(gl.FRAGMENT_SHADER, fs));
            gl.linkProgram(prog); gl.useProgram(prog);
            gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
            const pLoc = gl.getAttribLocation(prog, "p");
            gl.enableVertexAttribArray(pLoc);
            gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);
            const tL = gl.getUniformLocation(prog, "t"), sL = gl.getUniformLocation(prog, "s");
            const render = (time) => {
                gl.uniform1f(tL, time * 0.001);
                gl.uniform1f(sL, scrollY);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(render);
            };
            render(0);
        };
        setup();
    </script>
</body>
</html>
