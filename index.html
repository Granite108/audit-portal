<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Portal</title>
</head>
<body>
    <h1>Welcome to the Audit Portal</h1>
    <button class="gate-btn">Open Gate</button>
    <div class="center-column"></div>
    <aside class="tablet-left"></aside>
    <aside class="tablet-right"></aside>
    
    <!-- Script Block Added -->
    <script>
    /* [THE 13TH GATE UNLOCK: SARSEN PART 29] */
    const gateBtn = document.querySelector('.gate-btn');
    const threshold = document.querySelector('.threshold');

    // [THE BEHOLDER: Resonance Monitoring]
    let siteResonance = 10.8; 

    gateBtn.addEventListener('click', () => {
        // 1. [HEPHAESTUS: IGNITE THE FORGE]
        gateBtn.innerText = "[ IGNITING RESONANCE ]";
        gateBtn.style.color = "var(--gold-bright)";
        gateBtn.style.boxShadow = "0 0 30px var(--gold-glow)";

        // 2. [KRONOS: THE BROADSWORD PIXEL-SWAP]
        // We apply a "Granite Dissolve" to the Tablets
        setTimeout(() => {
            document.body.style.transition = "background-color 1.618s ease";
            document.body.style.backgroundColor = "#050505";
            
            // Dissolve the Decree and Calibration tablets
            document.querySelectorAll('aside').forEach(tablet => {
                tablet.style.transition = "all 1.1s cubic-bezier(0.4, 0, 0.2, 1)";
                tablet.style.opacity = "0";
                tablet.style.transform = "translateX(" + (tablet.classList.contains('tablet-left') ? "-100px" : "100px") + ");";
            });

            // 3. [THE LATTICE: MATERIALIZATION]
            // The Ankh shrinks to become the "Base Anchor" of the Ladder
            const ankh = document.querySelector('.ankh-wrap');
            ankh.style.transition = "all 1.618s cubic-bezier(0.19, 1, 0.22, 1)";
            ankh.style.transform = "scale(0.4) translateY(-200px)";
            
            // 4. [MIND FLAYER: THE ASCENSION]
            revealSovereignLadder();
        }, 800);
    });

    function revealSovereignLadder() {
        console.log("--- [SIGNAL: NOVAE_ULTRA] ASCENSION INITIATED ---");
        
        // Injecting the Ladder nodes into the center column
        const center = document.querySelector('.center-column');
        const ladderHTML = `
            <div id="sovereign-ladder" style="opacity:0; transform:translateY(50px); transition: all 1.618s ease;">
                <div class="ladder-node" style="border:1px solid var(--gold); padding:20px; margin:10px; text-align:center;">
                    <span style="color:var(--gold); font-family:'Cinzel';">APEX: $1.618</span>
                </div>
                <div class="ladder-node" style="border:1px solid var(--jade); padding:20px; margin:10px; text-align:center;">
                    <span style="color:var(--jade); font-family:'Cinzel';">STRATEGIC: $168.16</span>
                </div>
                <div class="ladder-node" style="border:2px solid var(--text-light); padding:30px; margin:10px; text-align:center; background:var(--gold-dim);">
                    <span style="font-family:'Cinzel Decorative';">GRANITE FOUNDATION: FREE</span>
                </div>
            </div>
        `;
        
        center.innerHTML += ladderHTML;
        
        setTimeout(() => {
            const ladder = document.getElementById('sovereign-ladder');
            ladder.style.opacity = "1";
            ladder.style.transform = "translateY(0)";
            document.querySelector('.gate-wrap').style.display = "none";
        }, 100);
    }
    </script>
</body>
</html>
