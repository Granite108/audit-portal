<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN_ENGINE_v13_CALIFORNIA_PREP</title>
    <style>
        :root {
            --obsidian: #050505; --red-gold: #ff4d00; --grid-blue: #00f2ff;
            --grid-violet: #bc13fe; --glow: 0 0 25px var(--red-gold);
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* --- STAGE 1: THE AUTOCAD GRID (SMOOTH ENGINE) --- */
        #viewport {
            width: 100vw; height: 100vh; position: relative;
            perspective: 2000px; overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #111, #000);
        }

        #hallway {
            width: 100%; height: 100%; position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.3, 1); /* Möbius Smoothness */
            will-change: transform;
        }

        #riemann-spine {
            position: absolute; left: 50%; width: 4px; height: 200%;
            top: -50%; background: var(--red-gold);
            box-shadow: var(--glow); transform: translateX(-50%);
        }

        #grid-floor {
            position: absolute; bottom: 0; width: 400%; height: 400%; left: -150%;
            background-image: 
                linear-gradient(var(--grid-blue) 2px, transparent 2px),
                linear-gradient(90deg, var(--grid-violet) 2px, transparent 2px);
            background-size: 200px 200px;
            transform: rotateX(80deg); transform-origin: bottom; opacity: 0.3;
        }

        /* --- STAGE 2: THE ADOBE CONSOLE (TEXTURED) --- */
        #console {
            position: absolute; bottom: 0; width: 100%; height: 25vh;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(10,10,10,0.95) 20%);
            border-top: 3px solid var(--red-gold);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100; padding: 0 20px;
        }

        .adobe-btn {
            width: 120px; height: 80px; 
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border: 2px solid var(--red-gold);
            border-radius: 4px; color: var(--red-gold);
            font-size: 11px; font-weight: 800; cursor: pointer;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5), inset 0 0 10px #300;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }

        .adobe-btn:hover { background: #222; box-shadow: 0 0 20px var(--red-gold); }

        #synthesize {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px double var(--red-gold); font-size: 14px;
            background: radial-gradient(circle, #300, #000);
            box-shadow: var(--glow);
        }

        /* --- STAGE 3: VOLUMETRIC DATA (THE SHAPE) --- */
        .data-volumetric {
            position: absolute; left: 50%; top: 40%;
            width: 150px; height: 150px; background: rgba(0,242,255,0.1);
            border: 2px solid var(--grid-blue); box-shadow: 0 0 40px var(--grid-blue);
            transform: translate(-50%, -50%) translateZ(-1000px);
            opacity: 0; transition: 1.5s; display: flex; align-items: center;
            justify-content: center; font-size: 12px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="hallway">
            <div id="riemann-spine"></div>
            <div id="grid-floor"></div>
            <div id="data-obj" class="data-volumetric">
                [TECHNICAL_MARROW]<br>95% UNTAPPED<br>ACCESS_GAP_LOCKED
            </div>
        </div>

        <div id="console">
            <div class="adobe-btn" onclick="presentStage(1)">STAGE 1:<br>FRICTION</div>
            <div class="adobe-btn" onclick="presentStage(2)">STAGE 2:<br>KEYWORDS</div>
            <div id="synthesize" class="adobe-btn" onclick="presentStage(3)">SYNTHESIZE</div>
            <div class="adobe-btn" onclick="presentStage(4)">STAGE 3:<br>95% GAP</div>
        </div>
    </div>

    <script>
        const voices = {
            seth: { p: 0.5, r: 0.8 },
            loki: { p: 1.2, r: 1 },
            hephaestus: { p: 0.8, r: 1.1 }
        };

        function speak(t, config) {
            const u = new SpeechSynthesisUtterance(t);
            u.pitch = config.p; u.rate = config.r;
            window.speechSynthesis.speak(u);
        }

        function presentStage(s) {
            const obj = document.getElementById('data-obj');
            if(s === 1) {
                speak("Stage One. Auditing the friction. Sixty-eight percent abandonment due to formulation failure.", voices.seth);
                obj.style.opacity = "1";
                obj.style.transform = "translate(-50%, -50%) translateZ(-500px) rotateY(45deg)";
            }
            if(s === 2) {
                speak("Stage Two. The Keywords. Inhaling no-cake and pore-blur marrow.", voices.loki);
                obj.innerHTML = "KEYWORDS:<br>NO-CAKE<br>PORE-BLUR<br>TRUE-SKIN";
            }
            if(s === 4) {
                speak("Stage Three. The Revelation. Ninety-five percent untapped market through insurance and access gaps.", voices.hephaestus);
                obj.style.transform = "translate(-50%, -50%) translateZ(-200px) rotateY(0deg)";
                obj.style.background = "rgba(255, 77, 0, 0.2)";
            }
        }

        /* MÖBIUS ZOOM LOGIC */
        let depth = 0;
        window.addEventListener('wheel', (e) => {
            depth += e.deltaY * -1.5;
            document.getElementById('hallway').style.transform = `translate3d(0, 0, ${depth}px)`;
        });
    </script>
</body>
</html>
