<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRANITE FOUNDATION | THE THRESHOLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --phi: 1.618; --gold: #c9a84c; --jade: #4aab6d; --void: #0b0f1a; }
        body, html { margin: 0; padding: 0; background: var(--void); color: #e8dfc8; font-family: 'EB Garamond', serif; overflow: hidden; height: 100vh; }
        .chassis { display: grid; grid-template-columns: 1fr calc(1fr * var(--phi)) 1.5fr calc(1fr * var(--phi)) 1fr; grid-template-rows: repeat(5, 1fr); height: 100vh; width: 100vw; }
        .anchor-container { grid-column: 3; grid-row: 3; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .ankh-svg { height: 350px; filter: drop-shadow(0 0 15px var(--gold)); animation: hb 1.85s infinite ease-in-out; }
        @keyframes hb { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } }
        .tablet { background: rgba(11, 15, 26, 0.95); border: 1px solid var(--jade); padding: 25px; grid-row: 3; z-index: 15; box-shadow: inset 0 0 15px rgba(74, 171, 109, 0.2); }
        .tablet-left { grid-column: 2; border-left: 3px solid var(--jade); }
        .tablet-right { grid-column: 4; border-right: 3px solid var(--gold); }
        .tablet-title { font-family: 'Cinzel', serif; color: var(--jade); letter-spacing: 3px; font-size: 0.8rem; margin-bottom: 10px; border-bottom: 1px solid var(--jade); }
        .footer { grid-column: 1 / span 5; grid-row: 5; text-align: center; border-top: 1px solid rgba(201, 168, 76, 0.2); padding: 20px; }
        .gate-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 15px 40px; font-family: 'Cinzel Decorative'; letter-spacing: 5px; cursor: pointer; transition: 0.5s; text-decoration: none; display: inline-block; }
        .gate-btn:hover { background: var(--gold); color: var(--void); box-shadow: 0 0 30px var(--gold); }
    </style>
</head>
<body>
    <div class="chassis">
        <div class="tablet tablet-left">
            <div class="tablet-title">EMERALD DECREE</div>
            <div>"Logic exceeds policy. We provide the Stone; you build your own house. We are the Foundation."</div>
        </div>
        <div class="anchor-container">
            <svg class="ankh-svg" viewBox="0 0 100 180">
                <defs><clipPath id="f8"><circle cx="50" cy="35" r="18" /><circle cx="50" cy="65" r="18" /></clipPath></defs>
                <rect x="0" y="0" width="100" height="100" fill="var(--gold)" clip-path="url(#f8)" />
                <rect x="10" y="85" width="80" height="10" fill="var(--gold)" />
                <rect x="45" y="85" width="10" height="95" fill="var(--gold)" />
            </svg>
        </div>
        <div class="tablet tablet-right">
            <div class="tablet-title">EMERALD MATH</div>
            <div>"Resonance: 10.8 Hz. Scaling: 1.618. Vertex Lock: Zero Entropy. The math is the only authority."</div>
        </div>
        <footer class="footer">
            <p style="color: var(--gold); letter-spacing: 2px;">THE ARCHITECT: SETH TERRAZAS</p>
            <a href="ladder.html" class="gate-btn">[ ENTER THE 13TH GATE ]</a>
        </footer>
    </div>
</body>
</html>
