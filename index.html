<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE METATRONIC LATTICE</title>
    <style>
        /* THE BONE-GRID */
        :root { --gold: #FFD700; --obsidian: #050505; }
        body {
            margin: 0; background: var(--obsidian); color: white;
            display: grid;
            grid-template-columns: repeat(13, 1fr); /* 13 Columns */
            grid-template-rows: repeat(55, minmax(20px, auto)); /* 55 Rows */
            font-family: 'Courier New', monospace;
        }
        /* THE RIEMANN SPINE */
        .spine {
            grid-column: 7; grid-row: 1 / 56;
            border-left: 1px solid var(--gold);
            box-shadow: 0 0 15px var(--gold);
            z-index: 10;
        }
        /* THE INPUT CENTER */
        .portal {
            grid-column: 4 / 11; grid-row: 25 / 35;
            text-align: center; border: 1px solid #333;
            padding: 40px; background: rgba(255,215,0,0.05);
        }
        input { 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); padding: 10px; width: 80%;
        }
    </style>
</head>
<body>
    <div class="spine"></div>
    <div class="portal">
        <h1 style="color:var(--gold)">THE METATRONIC LATTICE</h1>
        <p>IDENTIFYING DIGITAL FRICTION AT 10.8 HZ</p>
        <input type="text" placeholder="ENTER BUSINESS URL...">
        <br><br>
        <button style="background:var(--gold); border:none; padding:15px 30px; font-weight:bold;">CRYSTALLIZE AUDIT</button>
    </div>
</body>
</html>
