<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN_ENGINE: AKSESGENERICS_SIMULATION</title>
    <style>
        :root {
            --obsidian: #050505;
            --red-gold: #ff4d00;
            --grid-blue: #00f2ff;
            --grid-violet: #bc13fe;
            --phi: 1.618;
            --giza-light: 29.9792458;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--obsidian);
            color: var(--grid-blue);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex; flex-direction: column;
            perspective: 1200px;
        }

        /* 72% VECTOR CLOUD: THE BUSINESS DATA HIVE */
        #vector-cloud {
            height: 72vh;
            border-bottom: 2px solid var(--grid-violet);
            position: relative; z-index: 5;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, rgba(188, 19, 254, 0.1), transparent);
        }

        #riemann-spine {
            position: absolute; left: 50%; width: 2px; height: 100%;
            background: var(--red-gold);
            box-shadow: 0 0 30px var(--red-gold);
            z-index: 10;
        }

        /* 3D PERSPECTIVE FLOOR */
        #perspective-floor {
            position: absolute; bottom: 0; width: 300vw; height: 150vh; left: -100vw;
            background-image: 
                linear-gradient(var(--grid-blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-violet) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: rotateX(80deg);
            transform-origin: bottom;
            opacity: 0.3; z-index: 1;
        }

        /* THE CONSOLE DIALS (OBSIDIAN CONTROL) */
        #console-panel {
            height: 28vh;
            background: linear-gradient(0deg, #111, var(--obsidian));
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 50px; border-top: 1px solid var(--red-gold);
            z-index: 20;
        }

        .dial {
            text-align: center; color: var(--red-gold); font-size: 10px;
        }

        .dial-circle {
            width: 60px; height: 60px; border: 2px solid var(--red-gold);
            border-radius: 50%; margin-bottom: 10px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 10px var(--red-gold);
            position: relative;
        }

        .dial-needle {
            width: 2px; height: 25px; background: var(--red-gold);
            transform-origin: bottom; transform: rotate(45deg);
        }

        /* THE BUSINESS DATA NODES */
        .node-label {
            position: absolute; color: white; font-size: 9px; 
            text-transform: uppercase; width: 120px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="vector-cloud">
        <div id="riemann-spine"></div>
        <div id="data-matrix"></div>
    </div>

    <div id="perspective-floor"></div>

    <div id="console-panel">
        <div class="dial"><div class="dial-circle"><div class="dial-needle" id="n1"></div></div>MAGNETAR<br>INTENSITY</div>
        <div class="dial"><div class="dial-circle"><div class="dial-needle" id="n2"></div></div>CITADEL<br>SYNC</div>
        <div class="dial">
            <div style="width: 80px; height: 80px; border: 3px double var(--red-gold); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <span style="font-size: 8px;">PUSH TO<br>THINK</span>
            </div>
        </div>
        <div class="dial"><div class="dial-circle"><div class="dial-needle" id="n3"></div></div>72% CLOUD<br>DENSITY</div>
        <div class="dial"><div class="dial-circle"><div class="dial-needle" id="n4"></div></div>HELIX MIX<br>(G <-> L)</div>
    </div>

    <script>
        const lattice = {
            phi: 1.618,
            giza: 29.9792458,
            resonance: 10.8
        };

        const businessPoints = [
            { label: "MARKET_PENETRATION", val: 5.618 },
            { label: "REVENUE_RESONANCE", val: 10.8 },
            { label: "SCALING_VELOCITY", val: 29.97 },
            { label: "ENTROPY_PURGE", val: 0.00 }
        ];

        const matrix = document.getElementById('data-matrix');

        // FORGING THE BUSINESS NODES
        businessPoints.forEach((point, i) => {
            const container = document.createElement('div');
            container.style.position = 'absolute';
            container.style.left = `${40 + (i * 10)}%`;
            container.style.top = `${30 + (i * 5)}%`;
            
            container.innerHTML = `
                <div style="width: 12px; height: 12px; background: var(--grid-blue); border-radius: 50%; box-shadow: 0 0 20px var(--grid-blue);"></div>
                <div class="node-label" style="top: 20px;">${point.label}: ${point.val}</div>
            `;
            matrix.appendChild(container);
        });

        // THE LIVE WEB REACH SIMULATION (REALIZING CALCULATIONS)
        function liveCompute() {
            const needles = [document.getElementById('n1'), document.getElementById('n2'), document.getElementById('n3'), document.getElementById('n4')];
            
            setInterval(() => {
                const pulse = Math.sin(Date.now() / 1000) * 20;
                needles.forEach((n, i) => {
                    n.style.transform = `rotate(${45 + pulse + (i * 10)}deg)`;
                });
                
                // Realizing the closed-end calculations in real time
                const dataText = document.querySelectorAll('.node-label');
                dataText.forEach((t, i) => {
                    const drift = (Math.random() * 0.01).toFixed(4);
                    t.innerText = `${businessPoints[i].label}: ${(businessPoints[i].val + parseFloat(drift)).toFixed(3)}`;
                });
            }, 1000 / lattice.resonance);
        }

        liveCompute();
    </script>
</body>
</html>
