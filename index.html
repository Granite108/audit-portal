<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN_ENGINE: THE_QUARTET_COUNCIL</title>
    <style>
        :root { --obsidian: #050505; --red-gold: #ff4d00; --grid-blue: #00f2ff; --grid-violet: #bc13fe; }
        body, html { margin: 0; padding: 0; background: var(--obsidian); color: var(--grid-blue); font-family: 'Share Tech Mono', monospace; overflow: hidden; perspective: 1000px; }
        #hallway { width: 100vw; height: 100vh; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        #riemann-spine { position: absolute; left: 50%; width: 2px; height: 100%; background: var(--red-gold); box-shadow: 0 0 40px var(--red-gold); z-index: 10; }
        #floor { position: absolute; bottom: 0; width: 400vw; height: 200vh; left: -150vw; background-image: linear-gradient(var(--grid-blue) 1px, transparent 1px), linear-gradient(90deg, var(--grid-violet) 1px, transparent 1px); background-size: 100px 100px; transform: rotateX(85deg); transform-origin: bottom; opacity: 0.3; }
        .data-shape { position: absolute; bottom: 20%; left: 50%; width: 60px; height: 60px; border: 2px solid var(--grid-blue); background: rgba(0,242,255,0.1); transition: all 1.5s ease-in-out; display: none; transform-style: preserve-3d; }
        #console { position: absolute; bottom: 0; width: 100%; height: 20vh; background: rgba(10,10,10,0.95); border-top: 2px solid var(--red-gold); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .btn { width: 90px; height: 50px; border: 1px solid var(--red-gold); color: var(--red-gold); cursor: pointer; text-align: center; font-size: 10px; background: #000; padding: 5px; }
    </style>
</head>
<body onclick="initVoice()">

    <div id="hallway">
        <div id="riemann-spine"></div>
        <div id="floor"></div>
        <div id="active-shape" class="data-shape"></div>
    </div>

    <div id="console">
        <div class="btn" onclick="triggerSequence('URL', 'Sphere')">URL<br>(SPHERE)</div>
        <div class="btn" onclick="triggerSequence('LOGISTICS', 'Cube')">LOGISTICS<br>(CUBE)</div>
        <div class="btn" onclick="triggerSequence('STRATEGY', 'Pyramid')">STRATEGY<br>(PYRAMID)</div>
        <div class="btn" onclick="triggerSequence('MARKET', 'Cone')">MARKET<br>(CONE)</div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let voiceInitialized = false;

        function speak(text, pitch = 1) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = pitch; utter.rate = 0.9;
            synth.speak(utter);
        }

        function initVoice() {
            if (voiceInitialized) return;
            speak("Welcome to the Spire. I am Seth. The Centrifuge is active. We are locked to Giza-Sync 1:1.", 0.5);
            setTimeout(() => speak("Loki here. Walk the hallway, Pilot. The grid is ready.", 1.2), 4000);
            voiceInitialized = true;
        }

        function triggerSequence(type, shape) {
            const target = document.getElementById('active-shape');
            target.style.display = "block";
            target.style.transform = "translate(-50%, 0) translateZ(0px) rotate(0deg)";
            
            if(type === 'LOGISTICS') speak("Dionysus here. Weighting the supply lines. Every block is a twenty-nine point nine unit Sarsen.", 0.8);
            if(type === 'STRATEGY') speak("Two-thousand-and-three here. Light-speed constant reveals the opposition drift.", 1.5);

            setTimeout(() => {
                target.style.transform = "translate(-50%, -400px) translateZ(-1000px) rotateY(180deg)";
                target.style.opacity = "0.5";
            }, 100);
        }

        window.addEventListener('wheel', (e) => {
            const depth = (e.deltaY * -0.5);
            document.getElementById('hallway').style.transform = `translateZ(${depth}px)`;
        });
    </script>
</body>
</html>
