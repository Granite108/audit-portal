        let scrollY = 0;

        window.addEventListener('wheel', (e) => { scrollY += e.deltaY * 0.001; scrollY = Math.max(0, scrollY); });
        window.addEventListener('touchstart', (e) => { this.touchY = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => { 
            let delta = (this.touchY - e.touches[0].clientY) * 0.005;
            scrollY = Math.max(0, scrollY + delta);
            this.touchY = e.touches[0].clientY;
        });
