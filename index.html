<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE ORGANISM: SOVEREIGN LATTICE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #00AEEF; font-family: 'Courier New', monospace; overflow: hidden; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; border-left: 2px solid #00AEEF; padding-left: 15px; }
        #vault-status { position: absolute; bottom: 20px; right: 20px; color: gold; text-align: right; }
        .constant { font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div id="hud">
        <h2>[SYSTEM_STATUS: ACTIVE]</h2>
        <p>RESONANCE: <span class="constant">10.8 Hz</span></p>
        <p>LATITUDE: <span class="constant">29.9792458°N</span></p>
        <p>VELOCITY: <span class="constant">299,792,458 m/s</span></p>
    </div>
    <div id="vault-status">
        <p>VAULT_KEY: [835cafbd2c]</p>
        <p>ENFORCER: MASTER_SETH</p>
    </div>

    <script>
        // THE RIEMANN SPINE & TORQUE ENGINE
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // DODECAHEDRON ARMOR
        const geometry = new THREE.DodecahedronGeometry(2, 0);
        const material = new THREE.MeshBasicMaterial({ color: 0x00AEEF, wireframe: true, transparent: true, opacity: 0.5 });
        const dodeca = new THREE.Mesh(geometry, material);
        scene.add(dodeca);

        // THE RIEMANN SPINE (Z-AXIS)
        const points = [new THREE.Vector3(0, -10, 0), new THREE.Vector3(0, 10, 0)];
        const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffd700 });
        const spine = new THREE.Line(lineGeom, lineMat);
        scene.add(spine);

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            // TORQUE ROTATION BASED ON PHI (1.618)
            dodeca.rotation.y += 0.01 * 1.618;
            dodeca.rotation.x += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
