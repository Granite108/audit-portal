<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megalithic Bridge | Sovereign OS</title>
    <style>
        :root { --phi: 1.618; --obsidian: #050505; --auric: #FFD700; --cyan: #00f2ff; --violet: #8a2be2; }
        body, html { margin: 0; padding: 0; background: var(--obsidian); color: var(--auric); font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* THE THRESHOLD (PAGE 1) */
        #gate-13 {
            position: absolute; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            transition: transform 1.5s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s;
        }

        .manifesto-container { display: flex; width: 90%; max-width: 1200px; justify-content: space-between; align-items: flex-start; }
        .emerald-tablet { width: 30%; border: 1px solid var(--auric); padding: 20px; background: rgba(0,20,0,0.2); box-shadow: 0 0 15px rgba(255,215,0,0.1); }
        .anchor-center { width: 30%; text-align: center; }
        .anchor-svg { width: 100%; filter: drop-shadow(0 0 20px var(--auric)); cursor: pointer; transition: 0.5s; }
        .anchor-svg:hover { transform: scale(1.05); filter: drop-shadow(0 0 40px var(--cyan)); }

        /* THE ASCENT (PAGE 2) */
        #ascent-lattice { position: absolute; width: 100%; height: 100%; display: none; opacity: 0; transition: opacity 2s; }
        #glCanvas { width: 100%; height: 100%; display: block; }

        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .tier-label { position: absolute; left: 5%; color: var(--cyan); font-size: 0.8rem; letter-spacing: 3px; border-left: 1px solid var(--cyan); padding-left: 10px; }
        
        button.align-btn { 
            margin-top: 20px; background: none; border: 1px solid var(--auric); color: var(--auric); 
            padding: 15px 30px; cursor: pointer; font-family: inherit; letter-spacing: 5px; font-weight: bold;
        }
        button.align-btn:hover { background: var(--auric); color: #000; box-shadow: 0 0 30px var(--auric); }
    </style>
</head>
<body>

    <div id="gate-13">
        <div class="manifesto-container">
            <div class="emerald-tablet">
                <h3>[ THE DECREE ]</h3>
                <p>Logic exceeds policy.<br>The math is the authority.<br>We provide the Stone;<br>You build the house.</p>
            </div>
            <div class="anchor-center">
                <div style="font-size: 8rem;">⚓</div>
                <button class="align-btn" onclick="startAscent()">[ ALIGN SIGNAL ]</button>
            </div>
            <div class="emerald-tablet">
                <h3>[ THE MATH ]</h3>
                <p>Resonance: 10.8 Hz<br>Growth: 1.618 (Φ)<br>Parity: Sarsen 30<br>Entropy: 0.00</p>
            </div>
        </div>
    </div>

    <div id="ascent-lattice">
        <div class="ui-overlay">
            <div class="tier-label" style="top: 85%;">FREE: THE SEED</div>
            <div class="tier-label" style="top: 65%;">16.81: AUDIT SCALES</div>
            <div class="tier-label" style="top: 45%;">56.81: TRIAD LOCK</div>
            <div class="tier-label" style="top: 25%;">168.16: PENTAGON STRATEGY</div>
            <div class="tier-label" style="top: 5%;">1618.03: THE APEX</div>
        </div>
        <canvas id="glCanvas"></canvas>
    </div>

    <script>
        let scrollY = 0;
        window.addEventListener('wheel', (e) => { scrollY += e.deltaY * 0.001; });

        function startAscent() {
            // Frequency Initialization (10.8 Hz)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(10.8, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();

            // Z-Pinch Dive Transition
            const gate = document.getElementById('gate-13');
            gate.style.transform = "scale(5) translateZ(100px)";
            gate.style.opacity = "0";
            
            setTimeout(() => {
                gate.style.display = "none";
                const ascent = document.getElementById('ascent-lattice');
                ascent.style.display = "block";
                setTimeout(() => { ascent.style.opacity = "1"; initWebGL(); }, 100);
            }, 1000);
        }

        function initWebGL() {
            const canvas = document.getElementById('glCanvas');
            const gl = canvas.getContext('webgl');
            
            const vs = `attribute vec2 p; varying vec2 v; void main(){ v=p; gl_Position=vec4(p,0,1); }`;
            const fs = `
                precision highp float;
                varying vec2 v;
                uniform float t;
                uniform float s;

                void main() {
                    vec2 uv = v;
                    uv.y *= -1.0; // THE METATRONIC FLIP (INVERSION PROTOCOL)
                    
                    // LATTICE RADIUS SCALING (Φ)
                    float phi = 1.618;
                    float wave = sin(uv.y * 8.0 + (t*0.5)) * 0.05;
                    float spine = smoothstep(0.01, 0.0, abs(uv.x + wave) - 0.002);
                    
                    // FIBONACCI NODE SPAWNING
                    float grid = 0.0;
                    for(float i=1.0; i<8.0; i++) {
                        float depth = fract(i * 0.1618 - (s * 0.1));
                        vec2 nodePos = vec2(0.0, (depth * 2.0) - 1.0);
                        float node = smoothstep(0.02, 0.0, length(uv - nodePos) - 0.01);
                        grid += node;
                    }

                    vec3 col = mix(vec3(0.01), vec3(0.0, 0.6, 0.8), spine); // CYAN SPINE
                    col += vec3(1.0, 0.8, 0.0) * grid; // GOLD NODES
                    
                    gl_FragColor = vec4(col, 1.0);
                }
            `;

            const prog = gl.createProgram();
            const sh = (type, src) => {
                const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); gl.attachShader(prog, s);
            };
            sh(gl.VERTEX_SHADER, vs); sh(gl.FRAGMENT_SHADER, fs);
            gl.linkProgram(prog); gl.useProgram(prog);

            const buf = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, buf);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
            const pLoc = gl.getAttribLocation(prog, 'p');
            gl.enableVertexAttribArray(pLoc);
            gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

            function draw(now) {
                gl.uniform1f(gl.getUniformLocation(prog, 't'), now * 0.001);
                gl.uniform1f(gl.getUniformLocation(prog, 's'), scrollY);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
