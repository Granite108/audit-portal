<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megalithic Bridge | The Ascent</title>
    <style>
        :root { --phi: 1.61803398875; --obsidian: #050505; --auric: #FFD700; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--obsidian); overflow: hidden; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        footer { position: fixed; bottom: 20px; width: 100%; text-align: center; color: var(--auric); opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="glCanvas"></canvas>
    <footer>granitefoundation@proton.me</footer>

    <script>
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl');
        const PHI = 1.61803398875;
        let scrollY = 0;
        let lastTouchY = 0;

        // 10.8Hz RESONANCE
        const Resonance = {
            ctx: null,
            init() {
                if(this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.frequency.value = 10.8;
                gain.gain.value = 0.03;
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start();
            }
        };

        // UNIFIED INTERACTION
        const updateScroll = (delta) => { scrollY = Math.max(0, scrollY + delta); };
        window.addEventListener('wheel', (e) => updateScroll(e.deltaY * 0.001));
        window.addEventListener('touchstart', (e) => { 
            lastTouchY = e.touches[0].clientY; 
            Resonance.init(); 
        });
        window.addEventListener('touchmove', (e) => {
            let delta = (lastTouchY - e.touches[0].clientY) * 0.005;
            updateScroll(delta);
            lastTouchY = e.touches[0].clientY;
        });

        // SHADER CORE
        const vs = `attribute vec2 p; varying vec2 v; void main(){ v=p; gl_Position=vec4(p,0,1); }`;
        const fs = `
            precision highp float;
            varying vec2 v;
            uniform float t;
            void main() {
                vec2 uv = v * 1.5;
                float circle = length(uv - vec2(0.0, 0.4)) - 0.35;
                float bar_h = max(abs(uv.x) - 0.4, abs(uv.y - 0.0) - 0.04);
                float bar_v = max(abs(uv.x) - 0.06, abs(uv.y + 0.3) - 0.6);
                float ankh = min(circle, min(bar_h, bar_v));
                vec3 gold = vec3(1.0, 0.84, 0.0);
                float pulse = sin(t * 1.08) * 0.1 + 0.9;
                gl_FragColor = vec4(mix(vec3(0.02), gold * pulse, smoothstep(0.01, 0.0, ankh)), 1.0);
            }
        `;

        const setup = () => {
            const s = (type, src) => { const obj = gl.createShader(type); gl.shaderSource(obj, src); gl.compileShader(obj); return obj; };
            const prog = gl.createProgram();
            gl.attachShader(prog, s(gl.VERTEX_SHADER, vs));
            gl.attachShader(prog, s(gl.FRAGMENT_SHADER, fs));
            gl.linkProgram(prog); gl.useProgram(prog);
            
            gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
            const pLoc = gl.getAttribLocation(prog, "p");
            gl.enableVertexAttribArray(pLoc);
            gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);
            
            const tLoc = gl.getUniformLocation(prog, "t");
            const render = (time) => {
                gl.uniform1f(tLoc, time * 0.001);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
                requestAnimationFrame(render);
            };
            render(0);
        };
        setup();
    </script>
</body>
</html>
