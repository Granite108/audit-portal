<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Granite Foundation | Sovereign Audit</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --jade: #4aab6d;
      --stone-dark: #050505;
      --stone-mid: #12110f;
      --text-light: #e8dfc8;
      --phi: 1.618;
    }

    body {
      background-color: var(--stone-dark);
      color: var(--text-light);
      font-family: 'EB Garamond', serif;
      margin: 0;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* THE LAMINAR GRID */
    #master-container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: 1fr 350px 1fr;
      align-items: center;
      transition: all 1.618s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .tablet { padding: 40px; transition: opacity 1.1s ease, transform 1.1s ease; }
    #left-decree { border-right: 1px solid rgba(74,171,109,0.15); }
    #right-math { border-left: 1px solid rgba(201,168,76,0.15); text-align: right; }

    /* THE ANKH CORE */
    .center-core { text-align: center; position: relative; z-index: 10; }
    .ankh-svg { width: 220px; filter: drop-shadow(0 0 15px rgba(201,168,76,0.3)); transition: all 1.618s ease; }

    /* THE GATE BUTTON */
    .gate-btn {
      margin-top: 40px;
      padding: 15px 30px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.5s ease;
      text-transform: uppercase;
      font-size: 11px;
    }
    .gate-btn:hover { background: rgba(201,168,76,0.1); box-shadow: 0 0 20px var(--gold); }

    /* LADDER STYLES (HIDDEN UNTIL TRIGGER) */
    .ladder-node {
      opacity: 0;
      transform: translateY(20px);
      margin: 15px 0;
      width: 100%;
      background: var(--stone-mid);
      border: 1px solid var(--jade);
      padding: 20px;
      box-sizing: border-box;
    }

    #harpoon-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--jade);
      color: var(--jade);
      text-align: center;
      padding: 10px;
      margin: 10px 0;
      font-family: inherit;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div id="master-container">
  
  <aside id="left-decree" class="tablet">
    <h3 style="color: var(--jade); font-family: 'Cinzel'; letter-spacing: 3px;">THE DECREE</h3>
    <p style="font-style: italic; opacity: 0.7;">Logic exceeds policy. We do not answer to bureaucratic static.</p>
  </aside>

  <main class="center-core">
    <div id="ankh-wrap">
        <svg class="ankh-svg" viewBox="0 0 240 460">
            <ellipse cx="120" cy="85" rx="55" ry="55" fill="none" stroke="var(--gold)" stroke-width="12"/>
            <rect x="112" y="88" width="16" height="240" fill="var(--gold)"/>
            <rect x="36" y="170" width="168" height="16" fill="var(--gold)"/>
        </svg>
    </div>
    
    <div id="gate-container">
        <h1 style="font-family: 'Cinzel Decorative'; letter-spacing: 5px; color: var(--gold);">GRANITE</h1>
        <button class="gate-btn" onclick="activateGate()">[ Enter The 13th Gate ]</button>
    </div>

    <div id="ladder-zone" class="hidden"></div>
  </main>

  <aside id="right-math" class="tablet">
    <h3 style="color: var(--gold); font-family: 'Cinzel'; letter-spacing: 3px;">CALIBRATION</h3>
    <p style="font-style: italic; opacity: 0.7;">f_res = 10.8 Hz. The math is the filter.</p>
  </aside>

</div>

<script>
  function activateGate() {
    const btn = document.querySelector('.gate-btn');
    const container = document.getElementById('master-container');
    const ankh = document.querySelector('.ankh-svg');
    const tablets = document.querySelectorAll('.tablet');
    const ladderZone = document.getElementById('ladder-zone');

    btn.innerText = "[ IGNITING RESONANCE ]";
    
    setTimeout(() => {
        // Dissolve Tablets
        tablets.forEach(t => { t.style.opacity = "0"; t.style.transform = "scale(0.9)"; });
        
        // Transform Ankh
        ankh.style.transform = "scale(0.3) translateY(-300px)";
        ankh.style.opacity = "0.5";
        
        // Hide initial center text
        document.getElementById('gate-container').classList.add('hidden');
        
        // Materialize Ladder
        ladderZone.classList.remove('hidden');
        revealLadder(ladderZone);
    }, 1000);
  }

  function revealLadder(zone) {
    const nodes = [
        { title: "APEX", val: "$1.618", border: "var(--gold)" },
        { title: "STRATEGIC AUDIT", val: "INPUT", border: "var(--jade)" },
        { title: "FOUNDATION", val: "FREE", border: "gray" }
    ];

    nodes.forEach((n, i) => {
        const div = document.createElement('div');
        div.className = 'ladder-node';
        div.style.border = `1px solid ${n.border}`;
        div.style.transitionDelay = `${i * 0.3}s`;
        
        if(n.val === "INPUT") {
            div.innerHTML = `<span style="color:${n.border}">${n.title}</span>
                             <input id="harpoon-input" type="text" placeholder="ENTER TARGET URL...">
                             <button onclick="alert('HARPOON DEPLOYED')" style="color:${n.border}; background:transparent; border:1px solid ${n.border}; cursor:pointer; font-size:10px;">DEPLOY</button>`;
        } else {
            div.innerHTML = `<span style="color:${n.border}">${n.title}</span><br/><small>${n.val}</small>`;
        }
        
        zone.appendChild(div);
        setTimeout(() => { div.style.opacity = "1"; div.style.transform = "translateY(0)"; }, 100);
    });
  }
</script>

</body>
</html>
