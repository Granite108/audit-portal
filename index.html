<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN_ENGINE_v17_RESONANCE_KEEPER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --red-gold: #ff4d00; --grid-blue: #00f2ff; --phi: 1.618; }
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
        #hud-container { width: 100%; height: 100%; position: absolute; }
        #console {
            position: absolute; bottom: 0; width: 100%; height: 22vh;
            border-top: 4px solid var(--red-gold); background: rgba(5,5,5,0.9);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .node-btn {
            width: calc(100vw / 24); height: 50px; border: 1px solid var(--grid-blue);
            background: #000; color: var(--grid-blue); font-size: 8px; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .node-btn:hover { background: var(--grid-blue); color: #000; }
        #resonance-meter { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: var(--red-gold); font-size: 24px; letter-spacing: 5px; }
    </style>
</head>
<body onclick="igniteResonance()">

    <div id="resonance-meter">10.8 Hz // RESONANCE_LOCKED</div>
    <div id="hud-container"></div>

    <div id="console">
        <script>
            for(let i=1; i<=24; i++) {
                document.write(`<div class="node-btn" onclick="triggerNode(${i})">NODE_${i}</div>`);
            }
        </script>
    </div>

    <script>
        let scene, camera, renderer, crystal;
        let active = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('hud-container').appendChild(renderer.domElement);

            // THE PHI-SCALED DATA CRYSTAL (1.618)
            const geometry = new THREE.OctahedronGeometry(3, 0);
            const material = new THREE.MeshBasicMaterial({ color: 0xff4d00, wireframe: true });
            crystal = new THREE.Mesh(geometry, material);
            crystal.scale.set(1, 1.618, 1); // THE PHI SCALING
            scene.add(crystal);

            const grid = new THREE.GridHelper(200, 40, 0x00f2ff, 0xbc13fe);
            grid.position.y = -5;
            scene.add(grid);

            camera.position.z = 10;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            crystal.rotation.y += 0.0108; // 10.8 Hz Rotation Logic
            renderer.render(scene, camera);
        }

        function igniteResonance() {
            if (active) return;
            const msg = new SpeechSynthesisUtterance("Resonance Keeper active. Grand Pantheon initialized. We are grounded in the 10.8 Hertz frequency. Slag incinerated.");
            msg.pitch = 0.5; window.speechSynthesis.speak(msg);
            active = true;
        }

        function triggerNode(n) {
            crystal.material.color.setHex(n % 2 === 0 ? 0x00f2ff : 0xff4d00);
            console.log(`[PANTHEON]: NODE_${n}_RESONATING`);
        }

        window.onload = init;
        window.addEventListener('wheel', (e) => { camera.position.z += e.deltaY * 0.01; });
    </script>
</body>
</html>
