<!DOCTYPE <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SOVEREIGN_ENGINE: 39x112_RATIO_LOCK</title>
    <style>
        :root {
            --obsidian: #050505; --red-gold: #ff4d00; --grid-blue: #00f2ff;
            --grid-violet: #bc13fe; --phi: 1.618;
            /* THE SOVEREIGN PROPORTION */
            --ratio-w: 39; --ratio-h: 112;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: var(--grid-blue);
            font-family: 'Share Tech Mono', monospace; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* THE HARD-LOCKED CONTAINER (39x112) */
        #sovereign-viewport {
            width: calc(100vh * (var(--ratio-w) / var(--ratio-h)));
            height: 100vh;
            max-width: 100vw;
            background: var(--obsidian);
            position: relative;
            overflow: hidden;
            border: 2px solid #222;
            perspective: 1200px;
        }

        /* 3D HALLWAY & SPINE */
        #hallway {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #riemann-spine {
            position: absolute; left: 50%; width: 2px; height: 100%;
            background: var(--red-gold); box-shadow: 0 0 40px var(--red-gold); z-index: 10;
        }

        #floor {
            position: absolute; bottom: 0; width: 800%; height: 400%; left: -350%;
            background-image: 
                linear-gradient(var(--grid-blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-violet) 1px, transparent 1px);
            background-size: 100px 100px;
            transform: rotateX(85deg); transform-origin: bottom; opacity: 0.3;
        }

        .data-shape {
            position: absolute; bottom: 35%; left: 50%;
            width: 40px; height: 40px; border: 2px solid var(--grid-blue);
            background: rgba(0, 242, 255, 0.15); display: none;
            transform-style: preserve-3d; transition: all 1.8s ease-in-out;
        }

        /* OBSIDIAN CONSOLE */
        #console {
            position: absolute; bottom: 0; width: 100%; height: 30%;
            background: linear-gradient(0deg, #111, var(--obsidian));
            border-top: 2px solid var(--red-gold);
            display: flex; flex-wrap: wrap; justify-content: space-around; align-items: center; z-index: 100;
        }

        .btn {
            width: 42%; height: 20%; border: 1px solid var(--red-gold);
            color: var(--red-gold); cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            font-size: 8px; background: #000; margin: 2%;
        }

        #push-to-think {
            width: 60px; height: 60px; border: 4px double var(--red-gold);
            border-radius: 50%; font-weight: bold; margin: 5px;
        }
    </style>
</head>
<body onclick="ignite()">

    <div id="sovereign-viewport">
        <div id="hallway">
            <div id="riemann-spine"></div>
            <div id="floor"></div>
            <div id="active-shape" class="data-shape"></div>
        </div>

        <div id="console">
            <div class="btn" onclick="shot('URL')">URL</div>
            <div class="btn" onclick="shot('LOGISTICS')">LOGISTICS</div>
            <div id="push-to-think" class="btn">PUSH</div>
            <div class="btn" onclick="shot('STRATEGY')">STRATEGY</div>
            <div class="btn" onclick="shot('MARKET')">MARKET</div>
        </div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let active = false;

        function speak(t, p) {
            const u = new SpeechSynthesisUtterance(t);
            u.pitch = p; u.rate = 0.95; synth.speak(u);
        }

        function ignite() {
            if (active) return;
            speak("System initialization. 39 by 112 ratio locked. Giza-Sync active.", 0.6);
            active = true;
        }

        function shot(label) {
            const shape = document.getElementById('active-shape');
            shape.style.display = "block";
            shape.style.transform = "translate(-50%, 0) translateZ(0px)";
            
            if(label === 'LOGISTICS') speak("Dionysus. Materializing Sarsen logistics.", 0.8);
            if(label === 'STRATEGY') speak("2003. Mapping hierarchy.", 1.4);

            setTimeout(() => {
                shape.style.transform = "translate(-50%, -600px) translateZ(-2000px) rotateY(360deg)";
                shape.style.opacity = "0.2";
            }, 100);
        }

        let zPos = 0;
        window.addEventListener('wheel', (e) => {
            zPos += e.deltaY * -1;
            document.getElementById('hallway').style.transform = `translateZ(${zPos}px)`;
        });
    </script>
</body>
</html>
