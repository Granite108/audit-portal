name: Deploy Sovereign Portal
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
      runs-on: ubuntu-latest
    steps:
      - name: Checkout Sovereignty
        uses: actions/checkout@v3

      - name: Initialize the Forge
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Execute Hydra Master Control
        run: |
          python scripts/hydra_master_control.py
          
      - name: Force Commit Marrow
        run: |
          git config --global user.name "MASTER_ENFORCER_SETH"
          git config --global user.email "seth@sovereign.local"
          git add .
          git commit -m "MITOSIS_COMPLETE: [RESONANCE_SYNC_10.8Hz]" || echo "No changes to commit"
          git push
