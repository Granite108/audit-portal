<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granite Foundation | The Lattice</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c9a84c; --jade: #4aab6d; --void: #0b0f1a; --stone: #0f1420; --text: #e8dfc8; --blue: #0088ff; }
        body { background: var(--void); color: var(--text); font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .audit-box { width: 90%; max-width: 500px; border: 2px solid var(--blue); padding: 30px; position: relative; background: rgba(0,0,0,0.8); }
        h1 { color: var(--blue); font-size: 18px; letter-spacing: 4px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; margin-bottom: 20px; }
        .label { color: white; text-align: left; font-size: 14px; margin: 10px 0; }
        .value { color: var(--blue); }
        input { width: 100%; padding: 12px; margin: 20px 0; background: transparent; border: 1px solid var(--blue); color: var(--jade); font-family: 'Share Tech Mono'; }
        .btn { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; letter-spacing: 2px; }
        #scanning { display: none; color: var(--jade); margin: 20px 0; }
        #results { display: none; text-align: left; margin-top: 20px; border-top: 1px dotted var(--gold); padding-top: 20px; }
    </style>
</head>
<body>
    <div class="audit-box">
        <h1>I. THE AUDIT JUNCTION</h1>
        <div class="label">ENTITY: <span class="value">FENRIR (The Void Hound)</span></div>
        <div class="label">PARAMETER: <span class="value">STRIP_MEAT_LOGIC v1.1</span></div>
        
        <div id="inputGroup">
            <input type="text" id="urlInput" placeholder="INPUT URL FOR SNAP-LOCK...">
            <button class="btn" onclick="snapLock()">[ EXECUTE SNAP-LOCK ]</button>
        </div>

        <div id="scanning">SCANNING METADATA...<br>STRIPPING FRICTION...<br>GENERATING REPORT...</div>

        <div id="results">
            <div class="label" style="color:var(--jade)">[ SIGNAL VALIDATED ]</div>
            <div id="reportContent" style="font-size: 13px; line-height: 1.6; margin-top: 10px;"></div>
            <button class="btn" style="margin-top:20px; background:transparent; border:1px solid var(--jade); color:var(--jade);" onclick="location.reload()">RE-INITIALIZE</button>
        </div>
    </div>

    <script>
        function snapLock() {
            const val = document.getElementById('urlInput').value.trim();
            if(!val) return;

            document.getElementById('inputGroup').style.display = 'none';
            document.getElementById('scanning').style.display = 'block';

            setTimeout(() => {
                document.getElementById('scanning').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                
                const domain = val.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0].toUpperCase();
                document.getElementById('reportContent').innerHTML = `
                    DOMAIN: ${domain}<br>
                    REVENUE LEAK: Threshold Friction Detected.<br>
                    FRICTION SCORE: 8.2/10<br>
                    <span style="color:var(--gold)">STATUS: STAGE II READY FOR CALIBRATION.</span>
                `;
            }, 2500);
        }
    </script>
</body>
</html>
